[workspace]
members = [
    "crates/core",
    "crates/approach4",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "Apache-2.0"
version = "0.1.0"
authors = ["OpenAI Codex"]

[workspace.dependencies]
aes-gcm = "0.10.3"
anyhow = "1.0.100"
fastembed = { version = "5.13.3", default-features = true }
hmac = "0.12.1"
rand = "0.9.2"
rand_chacha = "0.9.0"
serde = { version = "1.0.228", features = ["derive"] }
sha2 = "0.10.9"
thiserror = "2.0.17"

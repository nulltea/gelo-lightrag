# Bind the passthrough consumer GPU to vfio-pci on the *host* before
# launching the CVM. This file lives inside the CVM image only for
# documentation purposes — its real twin must be installed on the host.
#
# Replace the IDs below with `lspci -nn | grep -i vga` output for your
# specific consumer GPU.
#
# RTX 4090 example:        options vfio-pci ids=10de:2684,10de:22ba
# RX 7900 XTX example:     options vfio-pci ids=1002:744c,1002:ab30
# Intel Arc A770 example:  options vfio-pci ids=8086:56a0,8086:4f92
#
# After updating this file on the host, regenerate the initramfs and
# reboot:
#     sudo update-initramfs -u && sudo reboot
